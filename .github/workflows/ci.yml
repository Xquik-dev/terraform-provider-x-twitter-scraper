name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - '**'
      - '!integrated/**'
      - '!stl-preview-head/**'
      - '!stl-preview-base/**'
      - '!generated'
      - '!codegen/**'
      - 'codegen/stl/**'
  pull_request:
    branches-ignore:
      - 'stl-preview-head/**'
      - 'stl-preview-base/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go

      - name: Link staging branch
        if: github.repository == 'stainless-sdks/x-twitter-scraper-terraform'
        env:
          STAINLESS_REF_NAME: ${{ github.ref_name }}
        run: |
          ./scripts/link "github.com/stainless-sdks/x-twitter-scraper-go@${STAINLESS_REF_NAME}" || true

      - name: Run lints
        run: ./scripts/lint

      - name: Check licensing
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0

  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go

      - name: Link staging branch
        if: github.repository == 'stainless-sdks/x-twitter-scraper-terraform'
        env:
          STAINLESS_REF_NAME: ${{ github.ref_name }}
        run: |
          ./scripts/link "github.com/stainless-sdks/x-twitter-scraper-go@${STAINLESS_REF_NAME}" || true

      - name: Run tests
        run: ./scripts/test

  security:
    name: Dependency Security
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go

      - name: Scan reachable vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

  build:
    name: Reproducible Release Build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup-go

      - name: Build snapshot
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: v2.17.0
          args: release --snapshot --clean --skip=sign

      - name: Preserve first checksum manifest
        env:
          FIRST_CHECKSUMS: ${{ runner.temp }}/first-checksums.txt
        run: |
          set -euo pipefail
          checksum_path="$(find dist -maxdepth 1 -type f -name '*_SHA256SUMS' -print -quit)"
          test -n "$checksum_path"
          install -m 0644 "$checksum_path" "$FIRST_CHECKSUMS"

      - name: Rebuild snapshot
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: v2.17.0
          args: release --snapshot --clean --skip=sign

      - name: Verify reproducible checksums
        env:
          FIRST_CHECKSUMS: ${{ runner.temp }}/first-checksums.txt
        run: |
          set -euo pipefail
          checksum_path="$(find dist -maxdepth 1 -type f -name '*_SHA256SUMS' -print -quit)"
          test -n "$checksum_path"
          cmp "$FIRST_CHECKSUMS" "$checksum_path"
