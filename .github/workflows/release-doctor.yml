name: Release Doctor
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  # Read repository source to validate release configuration.
  contents: read

concurrency:
  group: release-doctor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release_doctor:
    name: release doctor
    runs-on: ubuntu-latest
    if: github.repository == 'Xquik-dev/terraform-provider-x-twitter-scraper' && (github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release-please') || github.head_ref == 'next')

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Check release configuration
        run: |
          bash ./bin/check-release-environment
