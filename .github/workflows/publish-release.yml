---
name: Publish Release
permissions: {}

concurrency:
  group: publish

on:
  push:
    tags:
      - "v*.*.*"
jobs:
  goreleaser:
    name: Build, Sign & Publish
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    environment: release
    permissions:
      attestations: write # Store signed provenance for release artifacts.
      contents: write # Create the immutable GitHub release and upload signed assets.
      id-token: write # Mint the short-lived Sigstore signing identity.
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: "go.mod"
        cache: false
    - name: Verify release tag
      run: git describe --tags --exact-match
    - name: Check licensing
      uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0
    - name: Run release checks
      run: |
        ./scripts/lint
        ./scripts/test
    - name: Scan reachable vulnerabilities
      run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
    - name: Import GPG key
      id: import_gpg
      uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
      with:
        gpg_private_key: ${{ secrets.X_TWITTER_SCRAPER_GPG_SIGNING_KEY }}
        passphrase: ${{ secrets.X_TWITTER_SCRAPER_GPG_SIGNING_PASSWORD }}
    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
      with:
        distribution: goreleaser
        version: "v2.17.0"
        args: release --clean
      env:
        GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Locate Checksum Manifest
      id: checksums
      run: |
        set -euo pipefail
        checksum_path="$(find dist -maxdepth 1 -type f -name '*_SHA256SUMS' -print -quit)"
        test -n "$checksum_path"
        echo "path=$checksum_path" >> "$GITHUB_OUTPUT"
    - name: Attest Release Assets
      id: attest
      uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
      with:
        subject-checksums: ${{ steps.checksums.outputs.path }}
    - name: Attach Provenance
      env:
        ATTESTATION_BUNDLE: ${{ steps.attest.outputs.bundle-path }}
        GH_TOKEN: ${{ github.token }}
        RELEASE_TAG: ${{ github.ref_name }}
      run: |
        install -m 0644 "$ATTESTATION_BUNDLE" dist/provenance.intoto.jsonl
        gh release upload "$RELEASE_TAG" dist/provenance.intoto.jsonl --clobber
    - name: Publish Verified Release
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_TAG: ${{ github.ref_name }}
      run: gh release edit "$RELEASE_TAG" --draft=false --latest --verify-tag
