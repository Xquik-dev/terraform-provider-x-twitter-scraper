name: Setup Go
description: 'Sets up Go environment with private modules'
inputs:
  stainless-api-key:
    required: false
    description: the value of the STAINLESS_API_KEY secret
  go-version:
    required: false
    description: version or version range of Go to use
  cache-dependency-path:
    required: false
    description: path to dependency files for caching
runs:
  using: composite
  steps:
    - uses: stainless-api/retrieve-github-access-token@2f0857da7cbda281fff76af3def0681f915fb796 # v1.0.1
      id: get_token
      if: github.repository == 'stainless-sdks/x-twitter-scraper-terraform'
      with:
        repo: stainless-sdks/x-twitter-scraper-go
        stainless-api-key: ${{ inputs.stainless-api-key }}

    - name: Configure Git for to access Go SDK's staging repo
      if: github.repository == 'stainless-sdks/x-twitter-scraper-terraform'
      shell: bash
      env:
        STAINLESS_GITHUB_ACCESS_TOKEN: ${{ steps.get_token.outputs.github_access_token }}
      run: git config --global url."https://x-access-token:${STAINLESS_GITHUB_ACCESS_TOKEN}@github.com/stainless-sdks/x-twitter-scraper-go".insteadOf "https://github.com/stainless-sdks/x-twitter-scraper-go"

    - name: Setup go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: ${{ inputs.go-version }}
        go-version-file: ./go.mod
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Bootstrap
      shell: bash
      run: ./scripts/bootstrap
